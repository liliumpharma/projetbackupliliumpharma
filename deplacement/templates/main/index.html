      <script>
        // Référence à l'input et au conteneur
        const nbNuitsInput = document.getElementById("nbNuits");
        const jourDetailsContainer = document.getElementById(
          "jourDetailsContainer"
        );

        // Fonction pour générer les éléments jourDetails avec input date
        function generateJourDetails(nombre) {
          // Efface le contenu précédent
          jourDetailsContainer.innerHTML = "";

          // Génère les éléments jourDetails en fonction du nombre
          for (let i = 1; i <= nombre; i++) {
            const jourDetail = document.createElement("div");
            jourDetail.classList.add("date-container", "styled-night");

            jourDetail.innerHTML = `
              <label for="jour${i}">Nuit ${i} :</label>
              <label for="du${i}">Du</label>
              <input type="date" id="nuit${i}" />
              <label for="au${i}">Au</label>
              <input type="date" id="nuit${i}_end" readonly />
            `;

            jourDetailsContainer.appendChild(jourDetail);
          }
        }

        // Ajoute un écouteur d'événements sur l'input
        nbNuitsInput.addEventListener("input", function () {
          const nombre = parseInt(nbNuitsInput.value, 10);

          // Vérifie que le nombre est valide
          if (!isNaN(nombre) && nombre > 0) {
            generateJourDetails(nombre);
          }
        });

        // Génère les éléments jourDetails par défaut au chargement de la page
        generateJourDetails(nbNuitsInput.value);

        // Écoute les changements sur les champs de date
        document.addEventListener("change", function (e) {
          if (e.target && e.target.matches('input[type="date"]')) {
            const nuitInput = e.target;

            // Ignorer les champs de fin de nuit ("nuit_end")
            if (
              nuitInput.id.includes("nuit") &&
              nuitInput.id.endsWith("_end")
            ) {
              return;
            }

            const startDate = nuitInput.value;

            if (startDate) {
              // Convertit la date de début en objet Date et ajoute 1 jour
              const start = new Date(startDate);
              start.setDate(start.getDate() + 1);
              const endDate = start.toISOString().split("T")[0];

              // Associe la date de fin et la rend non modifiable
              const nuitEndInput = nuitInput
                .closest(".date-container")
                .querySelector(`input[id="${nuitInput.id}_end"]`);

              if (nuitEndInput) {
                nuitEndInput.value = endDate;
                nuitEndInput.readOnly = true;
              }
            }
          }
        });

    <script>
      const distanceKm = 0;

      $(document).ready(function () {
        let distanceKm = 0;
        $(".select2").select2();

        // Calculer la distance
        $("#wilaya1, #wilaya2").on("change", function () {
          const wilaya1 = $("#wilaya1").val().split(",");
          const wilaya2 = $("#wilaya2").val().split(",");
          const nbNuits = parseInt($("#nbNuits").val(), 10);

          const lat1 = wilaya1[0];
          const lon1 = wilaya1[1];
          const lat2 = wilaya2[0];
          const lon2 = wilaya2[1];

          if (!lat1 || !lat2 || isNaN(nbNuits) || nbNuits <= 0) {
            alert(
              "Veuillez sélectionner les deux wilayas et entrer un nombre valide de jours."
            );
            return;
          }

          // Construct the API request URL
          const url = `https://api.allorigins.win/get?url=${encodeURIComponent(
            `http://router.project-osrm.org/route/v1/driving/${lon1},${lat1};${lon2},${lat2}?overview=false`
          )}`;

          // Show loading state
          $("#result").text("Chargement...").show();
          $("#jourDetails").html(""); // Clear previous details

          fetch(url)
            .then((response) => response.json())
            .then((data) => {
              const osrmData = JSON.parse(data.contents);

              if (osrmData.routes && osrmData.routes.length > 0) {
                const distanceMeters = osrmData.routes[0].distance;
                distanceKm = (distanceMeters / 1000).toFixed(2);
                console.log("Distance: " + distanceKm + " km");

                if (distanceKm >= 150) {
                  // Affiche la distance en km
                  $("#result").html(`
                  La distance par route est de <span class="distance-value"> : ${distanceKm} km</span>
                  المسافة عبر الطريق  </br>
                `);

                  // Affiche le bouton "Calculer Coast"
                  $("#calculateCoastBtn").show();
                } else {
                  $("#result").html(`
                  La distance par route est de <span class="distance-value"> : ${distanceKm} km</span>
                  المسافة عبر الطريق  </br>
                `);

                  // Écoute les changements sur les champs de date

                  // Affiche le bouton "Calculer Coast"
                  $("#calculateCoastBtn").show();
                }
              }
            })
            .catch((error) => {
              $("#result").text(
                "Erreur lors de la récupération de la distance."
              );
              console.error("Erreur:", error);
            });
        });

        $("#calculateCoastBtn").click(function () {
          if (distanceKm >= 150) {
            const nbJours = parseInt($("#nbJours").val(), 10);
            const dates = [];

            for (let i = 1; i <= nbJours; i++) {
              const dateInput = $(`#nuit${i}`).val();
              if (dateInput) {
                dates.push(new Date(dateInput));
              }
            }

            if (dates.length === 0) {
              alert("Veuillez choisir les dates pour chaque jour.");
              return;
            }

            const firstDate = dates[0];
            const lastDate = dates[dates.length - 1];
            const differenceInTime = lastDate.getTime() - firstDate.getTime();
            const differenceInDays = differenceInTime / (1000 * 3600 * 24);

            const nbNuitsInput = document.getElementById("nbNuits");

            // Get the value of the input
            const nbNuitsValue = nbNuitsInput.value;
            // Arrondir les nuitées à l'entier supérieur
            const nuitées = nbNuitsValue; // Utilisation de Math.ceil pour arrondir au supérieur
            const jours = nbJours;

            // Calcul du coût
            const tarifParNuitée = 7000;
            const tarifParJour = 2000;
            const tarifDeplacement = 20; // 20 DA par km
            const coûtNuitées = nuitées * tarifParNuitée;
            const coûtJours = jours * tarifParJour;
            const coûtDeplacement = distanceKm * tarifDeplacement;
            const coûtEntier = Math.round(coûtDeplacement);
            const coûtTotall = coûtNuitées + coûtJours + coûtDeplacement;
            const coûtTotal = Math.round(coûtTotall);

            // Affichage des détails
            $("#coastResult")
              .html(
                `
                <div class="flex-container">
                  <div class="flex-item">
                    <p class="titre">Détails du calcul :</p>
                  </div>
                  <div class="flex-item">
                    <p class="titre">Nombre de nuitées : </p><span class="donnée">${nuitées}</span>
                  </div>
                  <div class="flex-item">
                    <p class="titre">Tarif hébergement Lilium Pharma : </p><p class="donnée">${tarifParNuitée} DZD / nuitée</p>
                  </div>
                  <div class="flex-item">
                    <p class="titre">Total des nuitées : </p><p class="donnée">${nuitées} * ${tarifParNuitée} = ${coûtNuitées} DZD</p>
                  </div>
                  <div class="flex-item">
                    <p class="titre">Nombre de jours : </p><p class="donnée">${jours}</p>
                  </div>
                  <div class="flex-item">
                    <p class="titre">Tarif restauration Lilium Pharma : </p><span class="donnée">${tarifParJour} DZD / jour</span>
                  </div>
                  <div class="flex-item">
                    <p class="titre">Total des jours : </p><p class="donnée">${jours} * ${tarifParJour} = ${coûtJours} DZD</p>
                  </div>
                  <div class="flex-item">
                    <p class="titre">Tarif déplacement Lilium Pharma : </p><p class="donnée">20 DZD / km</p>
                  </div>
                  <div class="flex-item">
                    <p class="titre">Total déplacement : </p><p class="donnée">${distanceKm} * 20 = ${coûtEntier} DZD</p>
                  </div>
                  <div class="flex-item">
                    <p class="titre">Coût total : </p><p class="donnée">${coûtTotal} DZD</p>
                  </div>
                </div>
                `
              )
              .show();
            $("#calculateCoastBtn").hide();
            $("#validateBtn").show();
          } else {
            // Calcul du coût
            const tarifParJour = 2000;
            const tarifDeplacement = 20; // 20 DA par km
            const jours = 1;
            const coûtJours = jours * tarifParJour;
            const coûtDeplacement = distanceKm * tarifDeplacement;
            const coûtEntier = Math.round(coûtDeplacement);
            const coûtTotall = coûtJours + coûtDeplacement;
            const coûtTotal = Math.round(coûtTotall);

            // Affichage des détails
            $("#coastResult")
              .html(
                `
                    <div class="flex-container">
                      <div class="flex-item">
                        <p class="titre">Détails du calcul :</p>
                      </div>
                      <div class="flex-item">
                        <p class="titre">Nombre de jours : </p><p class="donnée">${jours}</p>
                      </div>
                      <div class="flex-item">
                        <p class="titre">Tarif restauration Lilium Pharma : </p><span class="donnée">${tarifParJour} DZD / jour</span>
                      </div>
                      <div class="flex-item">
                        <p class="titre">Total des jours : </p><p class="donnée">${jours} * ${tarifParJour} = ${coûtJours} DZD</p>
                      </div>
                      <div class="flex-item">
                        <p class="titre">Tarif Semi déplacement Lilium Pharma : </p><p class="donnée">20 DZD / km</p>
                      </div>
                      <div class="flex-item">
                        <p class="titre">Total Semi déplacement : </p><p class="donnée">${distanceKm} * 20 = ${coûtEntier} DZD</p>
                      </div>
                      <div class="flex-item">
                        <p class="titre">Coût total : </p><p class="donnée">${coûtTotal} DZD</p>
                      </div>
                    </div>
                    `
              )
              .show();
            $("#calculateCoastBtn").hide();
            $("#validateBtn").show();
          }
        });
      });
    </script>
    <script>
      // Sélectionner les éléments des champs de dates
      const startDateInput = document.getElementById("start_date");
      const endDateInput = document.getElementById("end_date");

      // Fonction pour vérifier si la date de fin est inférieure à la date de début
      function validateDates() {
        const startDate = new Date(startDateInput.value);
        const endDate = new Date(endDateInput.value);

        if (endDate < startDate) {
          // Alerte en français avec emoji
          alert(
            "⚠️ Oups ! La date de fin de déplacement ne peut pas être inférieure à la date de début. ⚠️ ! لا يمكن أن تكون تاريخ نهاية الرحلة أقل من تاريخ بداية الرحلة. 🛑"
          );
          const today = new Date().toISOString().split("T")[0];

          // Réinitialiser les deux champs à la date d'aujourd'hui
          location.reload();
        }
      }

      // Ajouter des écouteurs d'événements 'onchange' pour les deux champs de dates
      startDateInput.addEventListener("change", validateDates);
      endDateInput.addEventListener("change", validateDates);
    </script>

    <script>
      document
        .getElementById("validateBtn")
        .addEventListener("click", function () {
          // Collect form data
          const formData = {
            startDate: document.getElementById("start_date").value,
            endDate: document.getElementById("end_date").value,
            nbJours: document.getElementById("nbJours").value,
            nbNuits: document.getElementById("nbNuits").value,
            wilaya1:
              document.getElementById("wilaya1").options[
                document.getElementById("wilaya1").selectedIndex
              ].text,
            wilaya2:
              document.getElementById("wilaya2").options[
                document.getElementById("wilaya2").selectedIndex
              ].text,
            distance: document
              .querySelector("#result .distance-value")
              .innerText.trim(),
            nuitsDetails: [],
          };

          // Collect nuit details
          const nuitElements = document.querySelectorAll(".date-container");
          nuitElements.forEach((nuitElement, index) => {
            const nuitStart = nuitElement.querySelector(
              `input[id="nuit${index + 1}"]`
            );
            const nuitEnd = nuitElement.querySelector(
              `input[id="nuit${index + 1}_end"]`
            );

            if (nuitStart && nuitEnd) {
              formData.nuitsDetails.push({
                nuit: index + 1,
                startDate: nuitStart.value,
                endDate: nuitEnd.value,
              });
            }
          });

          // Specify the URL to send data to
          const url =
            "https://app.liliumpharma.com/deplacement/deplacement/create/"; // Replace with your API endpoint

          // Send data using fetch
          console.log("sent data " + JSON.stringify(formData));

          // Send data using fetch
          fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          })
            .then((response) => {
              if (response.ok) {
                return response.json();
              }
              throw new Error("Network response was not ok.");
            })
            .then((data) => {
              console.log("Success:", data);
              alert("Data submitted successfully!");
            })
            .catch((error) => {
              console.error("Error:", error);
              alert("Failed to submit data.");
            });
        });
    </script>
