<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportation des Médecins</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #28a745; /* Couleur verte pour le titre */
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #28a745; /* Couleur verte pour l'en-tête */
            color: white;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .back-button {
            background-color: #fff;
            color: #28a745; /* Couleur verte pour le bouton de retour */
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .back-button:hover {
            background-color: #f0f0f0; /* Couleur de fond au survol */
        }

        .instructions {
            text-align: center;
            margin: 20px 0;
            font-size: 1.1em;
        }

        #progress-container {
            display: none; /* Masquer le conteneur par défaut */
            width: 100%;
            background-color: #f3f3f3;
            margin: 20px 0;
            border-radius: 5px;
            overflow: hidden;
        }

        #progress {
            height: 30px;
            width: 0%; /* Commencer avec une largeur de 0 */
            background-color: #28a745; /* Couleur verte pour la barre de progression */
            transition: width 0.5s; /* Animation de la largeur */
        }

        #loader {
            display: none; /* Masquer le loader par défaut */
            border: 4px solid #f3f3f3; /* Couleur de fond du loader */
            border-top: 4px solid #28a745; /* Couleur du haut du loader */
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite; /* Animation de rotation */
            margin-right: 10px; /* Espacement à droite du loader */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #success-message {
            display: none;
            color: #28a745; /* Couleur verte pour le message de succès */
            font-weight: bold;
            text-align: center;
        }

        .export-button {
            background-color: #28a745; /* Couleur verte pour le bouton d'exportation */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
            display: block;
            margin: 0 auto; /* Centrer le bouton */
        }

        .export-button:hover {
            background-color: #218838; /* Couleur verte foncée au survol */
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Téléchargement de la Liste des Médecins</h2>
        <a class="back-button" href="http://app.liliumpharma.com/medecins">Retour</a>
    </div>

    <h1>Exportation des Médecins</h1>

    <div class="instructions">
        <p>Pour télécharger la liste des médecins, veuillez cliquer sur le bouton ci-dessous.</p>
        <p>لتحميل قائمة الأطباء، يرجى النقر على الزر أدناه.</p>
    </div>
    
    <form id="export-form" method="POST">
        {% csrf_token %}
        <button type="submit" class="export-button">Télécharger la liste des médecins</button>
    </form>

    <div class="loading-container" style="text-align: center; display: none;">
        <div id="loader"></div>
        <span>Veuillez patienter...</span>
    </div>

    <div id="progress-container">
        <div id="progress"></div>
    </div>
    <div id="success-message">Téléchargement effectué avec succès !</div>

    <script>
        $(document).ready(function() {
            $("#export-form").on("submit", function(e) {
                e.preventDefault(); // Prévenir l'envoi normal du formulaire

                // Masquer le message de succès, afficher le loader et la barre de progression
                $("#success-message").hide();
                $(".loading-container").show(); // Afficher le loader
                $("#progress-container").show();
                $("#progress").css("width", "0%"); // Réinitialiser la barre de progression

                let progressValue = 0; // Valeur de progression initiale
                const progressInterval = setInterval(function() {
                    if (progressValue < 90) {
                        progressValue += 5; // Augmente de 5%
                        $("#progress").css("width", progressValue + "%");
                    }
                }, 2000); // 2 secondes

                // Envoyer la requête via AJAX
                $.ajax({
                    url: "{% url 'AllMedecinExportExcel' %}",
                    type: "GET",
                    data: $(this).serialize(),
                    xhrFields: {
                        responseType: 'blob' // Indique que nous attendons un blob en réponse
                    },
                    success: function(blob) {
                        clearInterval(progressInterval); // Arrête l'intervalle
                        $("#progress").css("width", "100%"); // Met la barre de progression à 100%

                        // Créer un lien temporaire pour le téléchargement
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `Liste_Medecins_${new Date().toISOString().split('T')[0]}.xlsx`; // Nom du fichier
                        document.body.appendChild(a); // Ajoute le lien au DOM
                        a.click(); // Simule un clic pour télécharger
                        a.remove(); // Supprime le lien
                        window.URL.revokeObjectURL(url); // Libère l'URL de l'objet

                        // Masquer le loader et afficher le message de succès
                        $(".loading-container").hide();
                        $("#success-message").show();
                    },
                    error: function(xhr, status, error) {
                        clearInterval(progressInterval); // Arrête l'intervalle
                        // Masquer la barre de progression et afficher un message d'erreur
                        $("#progress-container").hide();
                        $(".loading-container").hide();
                        alert("Erreur lors de l'exportation : " + error);
                    }
                });
            });
        });
    </script>
</body>
</html>
