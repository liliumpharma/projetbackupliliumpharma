<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commandes de Production</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
      <link
      href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Ajout d'un style propre */
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
        padding: 20px;
      }

      .cards-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }

      .card {
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 400px;
        padding: 20px;
        transition: transform 0.3s;
        cursor: pointer;
      }

      .card:hover {
        transform: translateY(-10px);
      }

      .card-header {
        display: block;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
      }

      .expand-icon {
        cursor: pointer;
      }

      .expand-content {
        display: none;
        margin-top: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      table,
      th,
      td {
        border: 1px solid #ddd;
      }

      th,
      td {
        padding: 8px;
        text-align: left;
      }

      th {
        background-color: #f4f6f9;
      }

      .receive-button,
      .transfer-button {
        display: inline-block;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: bold;
        color: white;
        text-align: center;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
      }

      .receive-button {
        background-color: blue; /* Style for "Réceptionner" button */
      }

      .transfer-button {
        background-color: orange; /* Style for "Transférer" button */
      }

      /* Modal styles */
      .modal {
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        padding-top: 60px;
      }

      .modal-content {
        background-color: white;
        margin: 5% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 80%;
      }

      .close {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
      }

      .close:hover,
      .close:focus {
        color: black;
        text-decoration: none;
        cursor: pointer;
      }
      .status-container {
        display: flex;
        align-items: center;
        justify-content: space-around;
        margin-top: 10px;
        font-family: "Special Elite", cursive;
      }

      .status-circle {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
        font-weight: bold;
        color: white;
      }

      .status.waiting .status-circle {
        background-color: orange;
      }

      .status.reception .status-circle {
        background-color: blue;
      }

      .status.transfer .status-circle {
        background-color: green;
      }
      .status {
        max-width: 100%; /* Make sure the status takes up no more than the card width */
        white-space: normal; /* Allow the text to wrap */
        word-wrap: break-word; /* Ensure long words or URLs break and wrap */
        overflow-wrap: break-word; /* Break long text to prevent overflow */
        font-family: "Special Elite", cursive; /* Utilisation de la police spéciale */
      }

      .arrow {
        margin: 0 10px;
        font-size: 20px;
        color: #aaa; /* Color for the arrow */
      }

      .status.waiting.active {
        color: orange;
      }

      .status.reception.active {
        color: blue;
      }

      .status.transfer.active {
        color: green;
      }
      .expand-content {
        display: none; /* Cacher par défaut */
      }
      /* Classe pour la bordure clignotante */
      .waiting-border {
        border: 2px solid orange;
        animation: blink 1s infinite alternate;
      }

      @keyframes blink {
        0% {
          border-color: orange;
        }
        100% {
          border-color: transparent;
        }
      }

      /* Classe pour la bordure clignotante de 'Waiting' */
      .waiting-border {
        border: 2px solid orange;
        animation: blink 1s infinite alternate;
      }

      /* Classe pour la bordure non clignotante de 'Réceptionnée' */
      .reception-border {
        border: 2px solid blue;
        animation: none;
      }

      /* Classe pour la bordure non clignotante de 'Transférée' */
      .transfer-border {
        border: 2px solid green;
        animation: none;
      }

      /* Animation de clignotement pour la bordure de 'Waiting' */
      @keyframes blink {
        0% {
          border-color: orange;
        }
        100% {
          border-color: transparent;
        }
      }

      /* Classe pour 'Waiting' (clignote orange) */
      .status.waiting.active {
        color: orange;
      }

      /* Classe pour 'Réceptionnée' (bleu sans clignotement) */
      .status.reception.active {
        color: blue;
      }

      /* Classe pour 'Transférée' (vert sans clignotement) */
      .status.transfer.active {
        color: green;
      }
      .ajouter-op-button {
        display: inline-block;
        padding: 10px 20px;
        background-color: #4caf50; /* Green background */
        color: white; /* White text */
        text-align: center;
        text-decoration: none; /* Remove underline */
        border-radius: 5px; /* Rounded corners */
        font-size: 16px;
        font-weight: bold;
        float: right; /* Align to the right */
        margin: 0; /* Remove top margin to push it up */
      }

      .ajouter-op-button:hover {
        background-color: #45a049; /* Darker green on hover */
      }
    </style>
  </head>
  <body>
    <h1>Liste Order Production</h1>
    <h4>Liste des Commandes de Production</h4>
    <a
      href="https://app.liliumpharma.com/production/add_op_front/"
      class="ajouter-op-button"
      >Ajouter OP</a
    >

    <div class="loading">Chargement des commandes...</div>

    <div class="cards-container" id="ordersContainer">
      <!-- Les cartes de commandes de production seront ajoutées ici -->
    </div>

    <!-- Modal for transferring order -->
    <div id="transferModal" class="modal" style="display: none">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Transférer du order production <span id="id_op"></span></h2>
        <h2>Bash <span id="op_bash"></span></h2>
        <h2>Date: <span id="op_date"></span></h2>

        <table id="transfer-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Item</th>
              <th>Quantité Demandée</th>
              <th style="color: red">Quantité Transférée</th>
            </tr>
          </thead>
          <tbody>
            <!-- Items will be dynamically added here -->
          </tbody>
        </table>
        <button class="transfer-button" onclick="submitTransfer(orderId)">
          Soumettre le transfert
        </button>
      </div>
    </div>

    <script>
      function openTransferModal(orderId, bash, date) {
        const modal = document.getElementById("transferModal");
        const op_id = document.getElementById("id_op");
        const op_bash = document.getElementById("op_bash");
        const op_date = document.getElementById("op_date");

        op_id.textContent = orderId;
        op_bash.textContent = bash;
        op_date.textContent = date;

        const transferTableBody = document.querySelector(
          "#transfer-table tbody"
        );

        // Vider le contenu précédent du tableau du modal
        transferTableBody.innerHTML = "";

        // Sélectionner les lignes du tableau d'items de la carte
        const itemRows = document.querySelectorAll(
          `#item-table-${orderId} tbody tr`
        );

        // Copier chaque ligne du tableau de la carte dans le tableau du modal
        itemRows.forEach((row) => {
          const id = row.cells[0].innerText; // Colonne "Item"
          const item = row.cells[1].innerText; // Colonne "Item"
          const quantity = row.cells[2].innerText;

          // Créer une nouvelle ligne pour le tableau du modal
          const newRow = document.createElement("tr");
          let formattedQuantity = parseFloat(quantity).toString(); // Remove trailing zeros

          newRow.innerHTML = `
            <td>${id}</td>
            <td>${item}</td>
            <td>${row.cells[2].innerText}</td>
            <td><input type="text" value="0" min="0" max="${quantity}" /></td>
          `;

          // Ajouter la nouvelle ligne au tableau du modal
          transferTableBody.appendChild(newRow);
        });

        // Afficher le modal
        modal.style.display = "block";

        // Sauvegarder l'ID de la commande dans un attribut du bouton pour le transfert
        const transferButton = modal.querySelector(".transfer-button");
        transferButton.setAttribute("onclick", `submitTransfer(${orderId})`);
      }

      function closeModal() {
        const modal = document.getElementById("transferModal");
        modal.style.display = "none";
      }

      const baseUrl =
        "https://app.liliumpharma.com/production/order-productions/";

      async function fetchOrders() {
        const loadingElement = document.querySelector(".loading");
        const ordersContainer = document.querySelector("#ordersContainer");

        try {
          loadingElement.style.display = "none";

          const response = await fetch(baseUrl);

          if (!response.ok) {
            throw new Error("Échec de la récupération des données");
          }

          const orders = await response.json();

          if (orders.length > 0) {
            ordersContainer.innerHTML = "";

            orders.forEach((order) => {
              const card = document.createElement("div");
              card.className = "card";
              card.id = `order_${order.id}`;

              // Appliquer une bordure clignotante si la location est 'waiting'
              if (order.location === "waiting") {
                card.classList.add("waiting-border");
              } else if (order.location === "stock_mp") {
                card.classList.add("reception-border");
              } else if (order.location === "pesee") {
                card.classList.add("transfer-border");
              }

              const addedDate = new Date(order.added);

              const formattedDate =
                addedDate.getFullYear() +
                "-" +
                ("0" + (addedDate.getMonth() + 1)).slice(-2) +
                "-" +
                ("0" + addedDate.getDate()).slice(-2) +
                " " +
                ("0" + addedDate.getHours()).slice(-2) +
                ":" +
                ("0" + addedDate.getMinutes()).slice(-2) +
                ":" +
                ("0" + addedDate.getSeconds()).slice(-2);

              // Déterminer l'état actif en fonction de la localisation
              const location = order.location;
              const waitingActive = location === "waiting" ? "active" : "";
              const receptionActive = location === "stock_mp" ? "active" : "";
              const transferActive = location === "pesee" ? "active" : "";

              // Affichage conditionnel des boutons en fonction de la localisation/état
              let actionButtonHTML = "";
              if (location === "waiting") {
                actionButtonHTML = `<div class="receive-button" onclick="receiveOrder(${order.id})">Réceptionner</div>`;
              } else if (location === "stock_mp") {
                actionButtonHTML = `<div class="transfer-button" onclick="openTransferModal('${order.id}','${order.batch_number}','${formattedDate}')">Transférer</div>`;
              }

              card.innerHTML = `
                    <div style="font-weight: bold">
                      <span>Order Production N° <span style="color:green">${order.id} </span></span>
                      </br>
                      <span>${formattedDate}</span>
                      <span class="expand-icon" onclick="toggleExpand(${order.id})">
                        <i class="fas fa-chevron-down"></i>
                      </span>
                    </div>
                                         <!-- Statut avec flèches et couleurs -->
<div class="status-container">
    <span class="status waiting ${waitingActive}">Waiting</span>
    <span class="arrow">→</span>
    <span class="status reception ${receptionActive}">Réceptionnée</span>
    <span class="arrow">→</span>
    <span class="status transfer ${transferActive}">Transférée</span>
        <span class="arrow">→</span>
    <span class="status transfer ${transferActive}">Traité</span>
</div>

                    <div class="card-body">
                      <p><strong>Produit :</strong> ${order.produit}</p>
                      <p><strong>Bash N° :</strong> ${order.batch_number}</p>
                      <p><strong>Type de Processus :</strong> ${order.process_type}</p>
                      <p><strong>Utilisateur :</strong> ${order.user}</p>
                      <p><strong>Location :</strong> <span style="color:red">${order.location}</span></p>
              
 
                    </div>
                    <div class="expand-content" id="expand-${order.id}" style="display: none;">
                      <table class="item-table" id="item-table-${order.id}">
                        <thead>
                          <tr>
                            <th>ID</th>
                            <th>Item</th>
                            <th>Quantité</th>
                          </tr>
                        </thead>
                        <tbody>
                          <!-- Les items seront ajoutés ici dynamiquement -->
                        </tbody>
                      </table>
                      ${actionButtonHTML}
                    </div>
                  `;

              ordersContainer.appendChild(card);

              // Fetch ItemOrderProduction for each order
              fetchItemOrderProduction(order.id);
            });
          } else {
            ordersContainer.innerHTML =
              '<div class="error-message">Aucune commande trouvée.</div>';
          }
        } catch (error) {
          loadingElement.style.display = "none";
          const errorMessage = document.createElement("div");
          errorMessage.className = "error-message";
          errorMessage.textContent = "Erreur lors du chargement des données.";
          document.body.appendChild(errorMessage);
        }
      }

      // Fonction de bascule d'expansion
      function toggleExpand(orderId) {
        // Sélectionner l'élément d'expansion spécifique pour l'ordre
        const expandElement = document.getElementById(`expand-${orderId}`);

        // Vérifier l'état actuel de l'élément d'expansion
        if (
          expandElement.style.display === "none" ||
          expandElement.style.display === ""
        ) {
          expandElement.style.display = "block"; // Afficher le contenu
          const icon =
            expandElement.previousElementSibling.querySelector(
              ".expand-icon i"
            );
          icon.classList.remove("fa-chevron-down");
          icon.classList.add("fa-chevron-up");
        } else {
          expandElement.style.display = "none"; // Masquer le contenu
          const icon =
            expandElement.previousElementSibling.querySelector(
              ".expand-icon i"
            );
          icon.classList.remove("fa-chevron-up");
          icon.classList.add("fa-chevron-down");
        }
      }

      async function fetchItemOrderProduction(orderId) {
        try {
          console.log(baseUrl + orderId + "/items/");
          const response = await fetch(`${baseUrl}${orderId}/items/`);
          const items = await response.json();

          const itemTableBody = document.querySelector(
            `#item-table-${orderId} tbody`
          );
          if (items.length > 0) {
            items.forEach((item) => {
              console.log(item);
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${item.id}</td>
                <td>${item.produit} ${item.item}</td>
                <td>${parseInt(item.qtt, 10)} ${item.unite}</td>
              `;
              itemTableBody.appendChild(row);
            });
          } else {
            const row = document.createElement("tr");
            row.innerHTML = `<td colspan="2">Aucun item trouvé.</td>`;
            itemTableBody.appendChild(row);
          }
        } catch (error) {
          console.error("Erreur de récupération des items:", error);
        }
      }

      function toggleExpand(orderId) {
        const expandContent = document.getElementById(`expand-${orderId}`);
        const expandIcon = document.querySelector(
          `#expand-${orderId} .expand-icon`
        );

        if (
          expandContent.style.display === "none" ||
          !expandContent.style.display
        ) {
          expandContent.style.display = "block";
          expandIcon.innerHTML = '<i class="fas fa-chevron-up"></i>';
        } else {
          expandContent.style.display = "none";
          expandIcon.innerHTML = '<i class="fas fa-chevron-down"></i>';
        }
      }

      function receiveOrder(orderId, location) {
        if (location === "stock_mp") {
          // Trigger the transfer action
          transferOrder(orderId);
        } else {
          // Trigger the reception action
          receptionOrder(orderId);
        }
      }

      function transferOrder(orderId) {
        alert(`Commande ${orderId} transférée !`);
        // Implement the transfer logic (e.g., update location to 'transferred')
      }

      function receptionOrder(orderId) {
        // URL de l'API pour mettre à jour la location
        const url = `https://app.liliumpharma.com/production/order-productions/${orderId}/receptionner/`;

        fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}", // Assurez-vous que le token CSRF est envoyé avec la requête
          },
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.message === "Location mise à jour à stock_mp") {
              // Mettre à jour la carte avec la nouvelle location
              const orderCard = document.querySelector(`#order_${orderId}`);
              const locationElement = orderCard.querySelector(".card-body p");
              locationElement.textContent = `Location: ${data.new_location}`;

              // Désactiver le bouton "Réceptionner" pour éviter un clic multiple
              const receiveButton = orderCard.querySelector(".receive-button");
              receiveButton.disabled = true;
              receiveButton.textContent = "Réceptionnée";
              location.reload();
            } else {
              alert(
                "Une erreur est survenue lors de la mise à jour de la location."
              );
            }
          })
          .catch((error) => {
            console.error("Erreur:", error);
            alert("Erreur lors de la mise à jour de la location.");
          });
      }

      window.onload = fetchOrders;

      function submitTransfer(orderId) {
        // URL de l'API pour effectuer le transfert
        const url = `https://app.liliumpharma.com/production/order-productions/${orderId}/transfert_pesee/`;

        // Récupérer les quantités transférées de chaque item du tableau du modal
        const transferTableRows = document.querySelectorAll(
          "#transfer-table tbody tr"
        );
        const transferData = [];
        let isValid = true; // Variable pour vérifier si le transfert est valide

        transferTableRows.forEach((row) => {
          const quantityTransferred = parseFloat(
            row.querySelector("input").value
          ); // Quantité transférée
          const quantityRequested = parseFloat(row.cells[2].innerText); // Quantité demandée
          const item = row.cells[1].innerText; // Nom de l'item
          const item_id = row.cells[0].innerText; // Nom de l'item

          // Vérifier que la quantité transférée ne dépasse pas la quantité demandée
          if (quantityTransferred < quantityRequested) {
            isValid = false;
            // Si la quantité est invalide, mettre en surbrillance l'input et afficher un message d'erreur
            row.querySelector("input").style.borderColor = "red"; // Mettre la bordure en rouge
          } else {
            row.querySelector("input").style.borderColor = ""; // Réinitialiser la couleur de la bordure
          }

          // Ajouter les données de transfert pour chaque item
          transferData.push({
            item_id: item_id,
            item: item,
            quantity_transferred: quantityTransferred,
          });
        });

        // Si le transfert n'est pas valide, afficher un message et ne pas soumettre
        if (!isValid) {
          alert(
            "La quantité transférée ne peut pas etre inferieure a la quantité demandée."
          );
          return;
        }

        // Envoyer la requête pour effectuer le transfert
        fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}", // Assurez-vous que le token CSRF est inclus
          },
          body: JSON.stringify({
            transfer_data: transferData, // Données de transfert
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            location.reload();

            // Mettre à jour la carte avec la nouvelle location
            const orderCard = document.querySelector(`#order_${orderId}`);
            const locationElement = orderCard.querySelector(".card-body p");
            locationElement.textContent = `Location: pesée`;

            // Désactiver le bouton "Transférer" pour éviter un clic multiple
            const transferButton = orderCard.querySelector(".transfer-button");
            transferButton.disabled = true;
            transferButton.textContent = "Transférée";
          })
          .catch((error) => {
            console.error("Erreur:", error);
            alert("Erreur lors du transfert.");
          });
      }
    </script>
  </body>
</html>
