<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Items Bash</title>

    <style>
      /* Background */
      body {
        background-color: #f4f9f4;
        font-family: "Arial", sans-serif;
      }

      /* Title */
      h1 {
        color: #2e7d32;
        font-size: 2.5rem;
        font-weight: bold;
        margin-bottom: 1rem;
        text-shadow: 1px 1px 2px #b8dbb8;
      }

      /* Table */
      .custom-table {
        border-collapse: collapse;
        width: 100%;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        border-radius: 12px;
        background-color: #ffffff;
      }

      .custom-table th {
        background-color: #2e7d32;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 1rem;
        text-transform: uppercase;
      }

      .custom-table td {
        padding: 12px;
        text-align: center;
        font-size: 0.9rem;
        color: #333;
      }

      .custom-table tr:hover {
        background-color: #c8e6c9;
        transition: background-color 0.3s ease;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }

        .custom-table td {
          font-size: 0.8rem;
        }

        .custom-table th {
          font-size: 0.9rem;
        }

        .btn-primary {
          font-size: 0.8rem;
          padding: 6px 12px;
        }
      }

      /* Button */
      .btn-primary {
        background-color: #43a047;
        border: none;
        color: white;
        padding: 8px 16px;
        font-size: 0.9rem;
        border-radius: 8px;
        transition: all 0.3s ease;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.2);
      }

      .btn-primary:hover {
        background-color: #2e7d32;
        transform: translateY(-2px);
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
      }

      .btn-primary:active {
        transform: translateY(0px);
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.2);
      }

      .btn-secondary {
        background-color: #d32f2f;
        color: white;
        border: none;
        padding: 8px 16px;
        font-size: 0.9rem;
        border-radius: 8px;
        transition: all 0.3s ease;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.2);
      }

      .btn-secondary:hover {
        background-color: #b71c1c;
        transform: translateY(-2px);
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
      }

      .btn-secondary:active {
        transform: translateY(0px);
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.2);
      }

      /* Modal styles */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal-content {
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        width: 50%;
        max-width: 600px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        position: relative;
      }

      .modal-header {
        font-size: 1.25rem;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .modal-body {
        margin-bottom: 20px;
      }

      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .close-modal {
        position: absolute;
        top: 10px;
        right: 10px;
        background: none;
        border: none;
        font-size: 1.25rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="text-center mb-4">Items Bash Groupés par Référence</h1>
      <div id="table-container"></div>
    </div>

    <!-- Custom Modal -->
    <div id="customModal" class="modal">
      <div class="modal-content">
        <button class="close-modal" onclick="closeModal()">&times;</button>
        <div class="modal-header">Confirmer le Transfert</div>
        <div class="modal-body">
          <p id="modal-description"></p>
          <ul id="modal-items" class="list-group"></ul>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">
            Annuler
          </button>
          <button class="btn btn-primary" id="confirm-transfer-btn">
            Confirmer
          </button>
        </div>
      </div>
    </div>

    <script>
      const groupColors = [
        "#e3f2fd",
        "#fce4ec",
        "#e8f5e9",
        "#fff3e0",
        "#ede7f6",
        "#f9fbe7",
      ];

      async function loadTable() {
        try {
          const response = await fetch(
            "https://app.liliumpharma.com/production/get_bash_items/"
          );
          if (!response.ok)
            throw new Error("Erreur lors de la récupération des données.");

          const data = await response.json();
          const groups = data.groups;

          let tableHTML = `
          <table class="custom-table">
            <thead>
              <tr>
                <th>Référence (Ref)</th>
                <th>Item ID</th>
                <th>Nom de l'Item</th>
                <th>Quantité</th>
                <th>Location</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
          `;

          let groupIndex = 0;

          for (const ref in groups) {
            const items = groups[ref];
            const groupColor = groupColors[groupIndex % groupColors.length];

            items.forEach((item, index) => {
              tableHTML += `
                <tr style="background-color: ${groupColor};">
                  <td>${index === 0 ? ref : ""}</td>
                  <td>${item.item_id}</td>
                  <td>${item.item_name}</td>
                  <td>${item.quantity}</td>
                  <td>${item.location}</td>
                  ${
                    index === 0
                      ? `<td rowspan="${items.length}" class="align-middle">
                          <button class="btn btn-primary" onclick='showTransferModal("${ref}", ${JSON.stringify(
                          items
                        ).replace(/'/g, "&quot;")})'>Transférer</button>
                        </td>`
                      : ""
                  }
                </tr>
              `;
            });

            groupIndex++;
          }

          tableHTML += `</tbody></table>`;
          document.getElementById("table-container").innerHTML = tableHTML;
        } catch (error) {
          console.error("Erreur lors du chargement des données:", error);
          document.getElementById("table-container").innerHTML =
            '<p class="text-danger">Erreur lors du chargement des données.</p>';
        }
      }

      function showTransferModal(ref, items) {
        document.getElementById(
          "modal-description"
        ).textContent = `Vous êtes sur le point de transférer le groupe avec la référence ${ref}.`;

        const modalItems = document.getElementById("modal-items");
        modalItems.innerHTML = "";
        items.forEach((item) => {
          modalItems.innerHTML += `
            <li class="list-group-item">
              <strong>Nom:</strong> ${item.item_name} - <strong>Quantité:</strong> ${item.quantity} - <strong>Location:</strong> ${item.location}
            </li>
          `;
        });

        const confirmButton = document.getElementById("confirm-transfer-btn");
        confirmButton.onclick = () => transferGroup(ref, items);

        document.getElementById("customModal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("customModal").style.display = "none";
      }

      async function transferGroup(ref, items) {
        try {
          const payload = {
            ref: ref,
            items: items.map((item) => ({
              name: item.item_name,
              quantity: item.quantity,
              location: item.location,
            })),
          };

          const response = await fetch(
            "https://app.liliumpharma.com/production/send__bash_group/",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken(),
              },
              body: JSON.stringify(payload),
            }
          );

          if (response.ok) {
            alert(`Groupe ${ref} transféré avec succès!`);
            closeModal();
            loadTable();
          } else {
            throw new Error("Erreur lors du transfert.");
          }
        } catch (error) {
          console.error("Erreur lors du transfert:", error);
          alert("Erreur lors du transfert du groupe.");
        }
      }

      function getCSRFToken() {
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.startsWith("csrftoken=")) {
            return cookie.substring("csrftoken=".length);
          }
        }
        return "";
      }

      loadTable();
    </script>
  </body>
</html>
