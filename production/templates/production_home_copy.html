{% load static %}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Production</title>
  <link rel="stylesheet" href="{% static 'production/style.css' %}" />

  <style>
    /* Keyframe for bounce animation */
    @keyframes bounce {
      0%,
      20%,
      50%,
      80%,
      100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-10px);
      }
      60% {
        transform: translateY(-5px);
      }
    }

    /* Animation for grid items on hover */
    .grid-item {
      list-style: none;
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease,
        background-color 0.3s ease;
      cursor: pointer;
      animation: fadeInUp 0.6s ease-out;
    }

    .grid-item:hover {
      background-color: #a8e6a3;
      color: #fff;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      animation: bounce 0.6s;
    }

    /* General grid styling */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .grid-item img {
      max-width: 60px;
      margin-bottom: 10px;
    }

    .grid-item a {
      text-decoration: none;
      color: inherit;
      font-weight: bold;
      display: block;
    }

    .grid-item:hover a {
      color: inherit;
    }

    .styled-img {
      width: 35px;
      height: 35px;
    }

    .navbar li {
      margin-right: 3px;
    }

    .navbar li:last-child {
      margin-right: 0;
    }

    /* Sidebar */
    .sidebar a {
      padding: 10px;
      text-decoration: none;
      color: #495057;
      display: block;
      transition: background-color 0.3s;
    }

    .sidebar a:hover {
      background: radial-gradient(circle, #228b22, #67cb57, #fff);
      color: white;
    }

    .sidebar .nav-item.active a {
      background-color: #dee2e6;
      color: #495057;
    }

    h4 {
      margin: 1.5rem 1rem;
      font-weight: bold;
      color: green;
    }

    /* Navbar animation */
    .navbar a {
      text-decoration: none;
      color: #495057;
      display: block;
      transition: background-color 0.3s, transform 0.3s, opacity 0.3s;
      border: 1px solid transparent;
      border-radius: 4px;
    }

    .navbar a:hover {
      background-color: #e9ecef;
      border-color: green;
      color: white;
      transform: translateY(-5px);
      opacity: 0.8;
      background: linear-gradient(#67cb57, #fff);
    }

    /* Card animation */
    .cardd {
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, opacity 0.3s;
      background: radial-gradient(circle, #b0f2b6, #fff);
    }

    .cardd:hover {
      border: 1px solid green;
      opacity: 0.8;
      transform: translateY(-5px);
    }

    /* Scroll to top button */
    #scrollToTopBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: none;
      background-color: #007bff;
      color: #fff;
      font-size: 16px;
      padding: 10px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 100;
    }

    /* Quick access */
    .quick-access {
      position: relative;
      display: inline-block;
      cursor: pointer;
    }

    .quick-access-menu {
      display: none;
      position: absolute;
      top: 0;
      left: 100%;
      width: 200px;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      padding: 10px;
      z-index: 1;
    }

    .quick-access-menu button {
      display: block;
      width: 100%;
      padding: 8px;
      margin-bottom: 5px;
      text-align: left;
      border: none;
      background-color: #e9ecef;
      cursor: pointer;
    }

    .quick-access-menu button:hover {
      background-color: #d1d8e0;
    }

    .butt {
      border: none;
      background-color: green;
      border-radius: 5px;
      color: white;
      margin: 10px 0 0 15px;
      padding: 15px;
    }

    .butto {
      border: 1px solid green;
      background-color: white;
      border-radius: 1px;
      color: green;
    }

    /* User profile header */
    .user-profile-header {
      background-color: #2e7d32;
      color: #fff;
      padding: 10px 0;
    }

    .container {
      max-width: 100%;
      margin: 0;
      padding: 0 15px;
    }

    .d-flex {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }

    .profile-title {
      display: flex;
      align-items: center;
      color: white;
      margin-right: 20px;
    }

    .styled-img {
      width: 25px;
      height: 25px;
      margin-right: 10px;
    }

    .user-info {
      display: flex;
      align-items: center;
      margin-right: 20px;
    }

    .date {
      margin-right: 20px;
    }

    .username {
      margin-right: 10px;
    }

    .logout-link {
      color: #fff;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .profile-title,
      .user-info {
        margin-right: 0;
      }

      .user-info {
        margin-top: 10px;
      }
    }

    @media (max-width: 576px) {
      .container {
        padding: 0;
      }
    }
  </style>

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    rel="stylesheet"
  />
</head>

<body>
  <div class="flex-wrap">
    <header class="user-profile-header">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <h3 class="profile-title" style="font-weight: bold">
            <img
              class="styled-img"
              src="{% static 'img/icons/logo-2.png' %}"
              alt="Logo"
            />
            <span>Bienvenue {{ user|title }}</span>
          </h3>
          <div class="user-info">
            <span class="date">{% now "l jS F Y" %}</span>
            <div class="user-details">
              <i class="fa fa-user"></i>
              <span class="username">{{ user }}</span>
              <a href="{% url 'logout' %}" class="logout-link">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
              </a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="mt-3">
      <ul class="navbar-nav grid-container">
        <!-- Planning -->
        <li class="nav-item grid-item">
          <a class="nav-link" href="/plans/mServices/monthly_planning/">
            <img
              class="styled-img"
              src="{% static 'img/icons/planning.png' %}"
              alt="Planning Icon"
            />
            <br />Planning
          </a>
        </li>

        <!-- Stock MP -->
        <li class="nav-item grid-item">
          <a
            class="nav-link"
            href="https://app.liliumpharma.com/production/mp/"
          >
            <img
              class="styled-img"
              src="{% static 'img/stock.png' %}"
              alt="Stock Icon"
            />
            <br />Stock MP
          </a>
        </li>

        <!-- Pesée -->
        <li class="nav-item grid-item">
          <a
            class="nav-link"
            href="https://app.liliumpharma.com/production/pesee/"
          >
            <img
              class="styled-img"
              src="{% static 'img/icons/pesee-4.png' %}"
              alt="Pesée Icon"
            />
            <br />Pesée
          </a>
        </li>

        <!-- Tableting -->
        <li class="nav-item grid-item">
          <a
            class="nav-link"
            href="https://app.liliumpharma.com/production/tableting_front/"
          >
            <img
              class="styled-img"
              src="{% static 'img/icons/pill.png' %}"
              alt="Pesée Icon"
            />
            <br />Tableting`
          </a>
        </li>

        <!-- Of -->
        <li class="nav-item grid-item">
          <a
            class="nav-link"
            href="https://app.liliumpharma.com/production/of/"
          >
            <img
              class="styled-img"
              src="{% static 'img/icons/of.png' %}"
              alt="Of Icon"
            />
            <br />OF
          </a>
        </li>

        <!-- Incidents -->
        <li class="nav-item grid-item">
          <a
            class="nav-link"
            href="https://app.liliumpharma.com/production/incidents/"
          >
            <img
              class="styled-img"
              src="{% static 'img/icons/incidents.png' %}"
              alt="Incidents Icon"
            />
            <br />Incidents
          </a>
        </li>
      </ul>
    </div>
  </div>
</body>
