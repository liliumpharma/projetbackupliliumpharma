<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Approvisionnement</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #f4f4f4;
        padding: 20px;
      }

      .navbar {
        width: 100%;
        background-color: red;
        color: white;
        padding: 20px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 10;
      }

      .navbar h1 {
        font-size: 24px;
      }

      .form-container {
        margin-top: 80px;
        width: 100%;
        max-width: 600px;
        padding: 20px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      }

      .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        font-size: 16px;
        margin-bottom: 8px;
        display: block;
        color: #333;
      }

      select,
      input,
      textarea {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }

      textarea {
        resize: vertical;
        height: 150px;
      }

      .button-container {
        display: flex;
        justify-content: center;
      }

      .button {
        background-color: green;
        color: white;
        font-size: 18px;
        font-weight: bold;
        padding: 15px 30px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        opacity: 0.5;
        pointer-events: none; /* Désactive le bouton initialement */
        transition: opacity 0.3s ease;
      }

      .button.active {
        opacity: 1;
        pointer-events: auto; /* Active le bouton lorsque tous les champs sont remplis */
      }

      .text-arabic {
        color: #333;
        font-size: 14px;
        margin-top: 5px;
        text-align: center;
      }

      .text-arabic span {
        display: block;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <h1>Section : Active ingredients</h1>
    </div>

    <!-- Formulaire d'approvisionnement -->
    <div class="form-container">
      <h2>Formulaire d'approvisionnement</h2>

      <div class="form-group">
        <label for="produit">Produit | المنتج</label>
        <select id="produit" onchange="validateForm()">
          <option value="">Sélectionner...</option>
          <option value="FM">FM</option>
          <option value="menolib">Menolib</option>
          <option value="autre">Autre</option>
        </select>
      </div>

      <div class="form-group">
        <label for="type-matiere"
          >Type de matière réceptionnée | نوع المادة المستلمة</label
        >
        <select id="type-matiere" onchange="validateForm()">
          <option value="">Sélectionner...</option>
          <option value="prefix">Premix</option>
          <option value="pic">PVC</option>
          <option value="pvdc">PVDC</option>
          <option value="aluminium">Aluminium</option>
        </select>
      </div>

      <div class="form-group">
        <label for="quantite">Quantité | الكمية</label>
        <input type="number" id="quantite" min="1" onchange="validateForm()" />
      </div>

      <div class="form-group">
        <label for="unite">Unité | الوحدة</label>
        <select id="unite" onchange="validateForm()">
          <option value="">Sélectionner...</option>
          <option value="kg">Kilogramme</option>
          <option value="g">Gramme</option>
          <option value="l">Litre</option>
          <option value="ml">Millilitre</option>
        </select>
      </div>

      <div class="form-group">
        <label for="observation">Observation | الملاحظات</label>
        <textarea id="observation" onchange="validateForm()"></textarea>
      </div>

      <div class="button-container">
        <button id="approvisionner" class="button" disabled>
          Approvisionner
        </button>
      </div>
    </div>

    <script>
      function validateForm() {
        const typeMatiere = document.getElementById("type-matiere").value;
        const quantite = document.getElementById("quantite").value;
        const unite = document.getElementById("unite").value;
        const produit = document.getElementById("produit").value;
        const observation = document.getElementById("observation").value;

        const button = document.getElementById("approvisionner");

        if (typeMatiere && quantite && unite && produit && observation) {
          button.classList.add("active");
          button.disabled = false;
        } else {
          button.classList.remove("active");
          button.disabled = true;
        }
      }
    </script>
  </body>
</html>
