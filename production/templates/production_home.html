{% load static %}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Production</title>
  <link rel="stylesheet" href="{% static 'production/style.css' %}" />

  <style>
    /* Keyframe for bounce animation */
    @keyframes bounce {
      0%,
      20%,
      50%,
      80%,
      100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-10px);
      }
      60% {
        transform: translateY(-5px);
      }
    }

    /* Animation for grid items on hover */
    .grid-item {
      list-style: none;
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease,
        background-color 0.3s ease;
      cursor: pointer;
      animation: fadeInUp 0.6s ease-out;
    }

    .grid-item:hover {
      background-color: #a8e6a3;
      color: #fff;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      animation: bounce 0.6s;
    }

    /* General grid styling */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .grid-item img {
      max-width: 60px;
      margin-bottom: 10px;
    }

    .grid-item a {
      text-decoration: none;
      color: inherit;
      font-weight: bold;
      display: block;
    }

    .grid-item:hover a {
      color: inherit;
    }

    .styled-img {
      width: 35px;
      height: 35px;
    }

    .navbar li {
      margin-right: 3px;
    }

    .navbar li:last-child {
      margin-right: 0;
    }

    /* Sidebar */
    .sidebar a {
      padding: 10px;
      text-decoration: none;
      color: #495057;
      display: block;
      transition: background-color 0.3s;
    }

    .sidebar a:hover {
      background: radial-gradient(circle, #228b22, #67cb57, #fff);
      color: white;
    }

    .sidebar .nav-item.active a {
      background-color: #dee2e6;
      color: #495057;
    }

    h4 {
      margin: 1.5rem 1rem;
      font-weight: bold;
      color: green;
    }

    /* Navbar animation */
    .navbar a {
      text-decoration: none;
      color: #495057;
      display: block;
      transition: background-color 0.3s, transform 0.3s, opacity 0.3s;
      border: 1px solid transparent;
      border-radius: 4px;
    }

    .navbar a:hover {
      background-color: #e9ecef;
      border-color: green;
      color: white;
      transform: translateY(-5px);
      opacity: 0.8;
      background: linear-gradient(#67cb57, #fff);
    }

    /* Card animation */
    .cardd {
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, opacity 0.3s;
      background: radial-gradient(circle, #b0f2b6, #fff);
    }

    .cardd:hover {
      border: 1px solid green;
      opacity: 0.8;
      transform: translateY(-5px);
    }

    /* Scroll to top button */
    #scrollToTopBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: none;
      background-color: #007bff;
      color: #fff;
      font-size: 16px;
      padding: 10px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 100;
    }

    /* Quick access */
    .quick-access {
      position: relative;
      display: inline-block;
      cursor: pointer;
    }

    .quick-access-menu {
      display: none;
      position: absolute;
      top: 0;
      left: 100%;
      width: 200px;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      padding: 10px;
      z-index: 1;
    }

    .quick-access-menu button {
      display: block;
      width: 100%;
      padding: 8px;
      margin-bottom: 5px;
      text-align: left;
      border: none;
      background-color: #e9ecef;
      cursor: pointer;
    }

    .quick-access-menu button:hover {
      background-color: #d1d8e0;
    }

    .butt {
      border: none;
      background-color: green;
      border-radius: 5px;
      color: white;
      margin: 10px 0 0 15px;
      padding: 15px;
    }

    .butto {
      border: 1px solid green;
      background-color: white;
      border-radius: 1px;
      color: green;
    }

    /* User profile header */
    .user-profile-header {
      background-color: #2e7d32;
      color: #fff;
      padding: 10px 0;
    }

    .container {
      max-width: 100%;
      margin: 0;
      padding: 0 15px;
    }

    .d-flex {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }

    .profile-title {
      display: flex;
      align-items: center;
      color: white;
      margin-right: 20px;
    }

    .styled-img {
      width: 25px;
      height: 25px;
      margin-right: 10px;
    }

    .user-info {
      display: flex;
      align-items: center;
      margin-right: 20px;
    }

    .date {
      margin-right: 20px;
    }

    .username {
      margin-right: 10px;
    }

    .logout-link {
      color: #fff;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .profile-title,
      .user-info {
        margin-right: 0;
      }

      .user-info {
        margin-top: 10px;
      }
    }

    @media (max-width: 576px) {
      .container {
        padding: 0;
      }
    }

    /* Animation for grid items on hover */
    .grid-item {
      list-style: none;
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease,
        background-color 0.3s ease;
      cursor: pointer;
      animation: fadeInUp 0.6s ease-out;
    }

    .grid-item:hover {
      background-color: #a8e6a3;
      color: #fff;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      animation: bounce 0.6s;
    }

    /* General grid styling */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .grid-item img {
      max-width: 60px;
      margin-bottom: 10px;
    }

    .grid-item a {
      text-decoration: none;
      color: inherit;
      font-weight: bold;
      display: block;
    }

    .grid-item:hover a {
      color: inherit;
    }

    .styled-img {
      width: 35px;
      height: 35px;
    }

    /* Modal styles */
    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background-color: #fefefe;
      margin: 10% auto;
      padding: 20px;
      border: 1px solid #888;
      width: 350px;
      text-align: center;
    }

    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
    }

    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }

    .input-password {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-align: center;
      font-size: 20px;
    }

    .keyboard {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .keyboard-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .key {
      padding: 15px;
      background-color: #e9ecef;
      border: none;
      border-radius: 5px;
      font-size: 20px;
      cursor: pointer;
    }

    .key:hover {
      background-color: #d1d8e0;
    }

    .clear {
      background-color: #f44336;
      color: white;
    }

    .submit {
      background-color: #4caf50;
      color: white;
    }

    .key:active {
      transform: scale(0.95);
    }
  </style>

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    rel="stylesheet"
  />
</head>

<body>
  <div class="flex-wrap">
    <header class="user-profile-header">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <h3 class="profile-title" style="font-weight: bold">
            <img
              class="styled-img"
              src="{% static 'img/icons/logo-2.png' %}"
              alt="Logo"
            />
            <span>Bienvenue {{ user|title }}</span>
          </h3>
          <div class="user-info">
            <span class="date">{% now "l jS F Y" %}</span>
            <div class="user-details">
              <i class="fa fa-user"></i>
              <span class="username">{{ user }}</span>
              <a href="{% url 'logout' %}" class="logout-link">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
              </a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="mt-3">
      <ul class="navbar-nav grid-container">
        <!-- Planning -->
        <li class="nav-item grid-item">
          <a class="nav-link" href="/plans/mServices/monthly_planning/">
            <img
              class="styled-img"
              src="{% static 'img/icons/planning.png' %}"
              alt="Planning Icon"
            />
            <br />Planning
          </a>
        </li>

        <!-- Stock MP -->
        <li class="nav-item grid-item">
          <a class="nav-link" href="javascript:void(0)" id="stockMpLink">
            <img
              class="styled-img"
              src="{% static 'img/stock.png' %}"
              alt="Stock Icon"
            />
            <br />Stock MP
          </a>
        </li>

        <!-- Other items... -->
        <li class="nav-item grid-item">
          <a
            class="nav-link"
            href="https://app.liliumpharma.com/production/op_front/"
            id="OPLink"
          >
            <img
              class="styled-img"
              src="{% static 'img/op.png' %}"
              alt="Stock Icon"
            />
            <br />Order Production
          </a>
        </li>
        <li class="nav-item grid-item">
          <a
            class="nav-link"
            href="https://app.liliumpharma.com/production/pesee_front/"
            id="OPLink"
          >
            <img
              class="styled-img"
              src="{% static 'img/weight.png' %}"
              alt="Stock Icon"
            />
            <br />Pesée
          </a>
        </li>
        <!-- Tableting -->
        <li class="nav-item grid-item">
          <a
            class="nav-link"
            href="https://app.liliumpharma.com/production/tableting_front/"
          >
            <img
              class="styled-img"
              src="{% static 'img/pill.png' %}"
              alt="Pesée Icon"
            />
            <br />Tableting
          </a>
        </li>
        <!-- MP PESEE -->
        <li class="nav-item grid-item">
          <a
            class="nav-link"
            href="https://app.liliumpharma.com/production/mp_pesee_front/"
          >
            <img
              class="styled-img"
              src="{% static 'img/mp_pesee.png' %}"
              alt="MP Pesée Icon"
            />
            <br />MP Pesée
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Modal for password entry -->
  <!-- Modal for password entry with numeric keypad -->
  <div id="passwordModal" class="modal" style="display: none">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h4>Veuillez entrer le mot de passe :</h4>
      <div class="keyboard">
        <input
          type="text"
          id="passwordInput"
          class="input-password"
          placeholder="Mot de passe"
          readonly
        />
        <div class="keyboard-buttons">
          <button class="key" data-value="1">1</button>
          <button class="key" data-value="2">2</button>
          <button class="key" data-value="3">3</button>
          <button class="key" data-value="4">4</button>
          <button class="key" data-value="5">5</button>
          <button class="key" data-value="6">6</button>
          <button class="key" data-value="7">7</button>
          <button class="key" data-value="8">8</button>
          <button class="key" data-value="9">9</button>
          <button class="key" data-value="0">0</button>
          <button class="key clear">C</button>
          <button class="key submit">Entrer</button>
        </div>
      </div>
      <p id="error-message" style="color: red; display: none">
        Mot de passe incorrect!
      </p>
    </div>
  </div>

  <script>
    // Get modal and elements
    const modal = document.getElementById("passwordModal");
    const passwordInput = document.getElementById("passwordInput");
    const closeModal = document.getElementsByClassName("close")[0];
    const stockMpLink = document.getElementById("stockMpLink");
    const OPLINK = document.getElementById("OPLINK");
    const errorMessage = document.getElementById("error-message");
    const keys = document.querySelectorAll(".keyboard .key");
    const clearBtn = document.querySelector(".keyboard .clear");
    const submitBtn = document.querySelector(".keyboard .submit");

    // Open modal when "Stock MP" link is clicked
    stockMpLink.onclick = () => {
      modal.style.display = "block";
    };

    // Close modal when user clicks 'x'
    closeModal.onclick = () => {
      modal.style.display = "none";
    };

    // Close modal when clicked outside
    window.onclick = (event) => {
      if (event.target === modal) {
        modal.style.display = "none";
      }
    };

    // Handle numeric keypad input
    keys.forEach((key) => {
      key.onclick = () => {
        if (key.classList.contains("clear")) {
          passwordInput.value = ""; // Clear input
        } else if (key.classList.contains("submit")) {
          // Submit password check
          const enteredPassword = passwordInput.value;
          if (enteredPassword === "1234") {
            window.location.href =
              "https://app.liliumpharma.com/production/mp-index/";
          } else {
            errorMessage.style.display = "block";
          }
        } else {
          // Append clicked value to input
          passwordInput.value += key.getAttribute("data-value");
        }
      };
    });
  </script>
</body>
