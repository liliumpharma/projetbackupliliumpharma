<script>
Chart.register(ChartDataLabels);

/* ── Page-ready promise (resolves once data loaded + all chart animations done) ── */
let _resolvePageReady;
const pageReady = new Promise(resolve => { _resolvePageReady = resolve; });
let _pendingCharts  = 0;
let _completedCharts = 0;
let _dataLoaded = false;
function _onChartAnimationComplete() {
    _completedCharts++;
    if (_dataLoaded && _completedCharts >= _pendingCharts) _resolvePageReady();
}
function _markDataLoaded() {
    _dataLoaded = true;
    if (_completedCharts >= _pendingCharts) _resolvePageReady();
}

/* ── Share Report ── */
async function shareReport() {
    const btn = document.getElementById('share-fab');
    const originalHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '⏳ Génération...';
    try {
        await pageReady;
        btn.style.visibility = 'hidden';
        const savedScrollY = window.scrollY;
        window.scrollTo({ top: 0, behavior: 'instant' });
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        const fullW = document.documentElement.scrollWidth;
        const fullH = document.documentElement.scrollHeight;
        const canvas = await window.html2canvas(document.body, {
            scale: 1.5, useCORS: true, logging: false,
            scrollX: 0, scrollY: 0, x: 0, y: 0,
            width: fullW, height: fullH, windowWidth: fullW, windowHeight: fullH
        });
        window.scrollTo({ top: savedScrollY, behavior: 'instant' });
        btn.style.visibility = 'visible';
        const imgData = canvas.toDataURL('image/jpeg', 0.92);
        const pxW = canvas.width, pxH = canvas.height;
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: pxW >= pxH ? 'landscape' : 'portrait', unit: 'px', format: [pxW, pxH], hotfixes: ['px_scaling'] });
        pdf.addImage(imgData, 'JPEG', 0, 0, pxW, pxH);
        const pdfBlob = pdf.output('blob');
        const pdfFile = new File([pdfBlob], 'stats_produits.pdf', { type: 'application/pdf' });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
            await navigator.share({ title: 'Statistiques Produits', text: 'Rapport généré automatiquement', files: [pdfFile] });
        } else {
            const url = URL.createObjectURL(pdfBlob);
            const a = document.createElement('a');
            a.href = url; a.download = 'stats_produits.pdf';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert('Partage direct non disponible sur ce navigateur.\nLe PDF a été téléchargé à la place.');
        }
    } catch (err) {
        btn.style.visibility = 'visible';
        if (err.name !== 'AbortError') { console.error('shareReport error:', err); alert('Erreur : ' + err.message); }
    } finally {
        btn.style.visibility = 'visible';
        btn.disabled = false;
        btn.innerHTML = originalHTML;
    }
}

/* ── Helpers ── */
function fmtDA(n) {
    return Number(n).toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' DA';
}
function fmtUnits(n) {
    return Number(n).toLocaleString('fr-FR', { maximumFractionDigits: 0 });
}

const COLOR_PALETTE = ['#E53935','#4CAF50','#03A9F4','#FF9800','#AB47BC','#00BCD4','#FFEB3B','#F06292','#8D6E63','#26C6DA'];
const _colorMap = {};
let _colorIdx = 0;
function colorForLabel(label) {
    if (!_colorMap[label]) { _colorMap[label] = COLOR_PALETTE[_colorIdx % COLOR_PALETTE.length]; _colorIdx++; }
    return _colorMap[label];
}

const chartInstances = {};

/* ── Data processing (stacked PH_GROS / GROS_SUPER) ── */
function processData(raw, filterFn, groupKeyFn, segmentKeyFn) {
    const entities = {};
    const segmentsSet = new Set();
    raw.forEach(item => {
        if (filterFn && !filterFn(item)) return;
        const entityLabel = groupKeyFn(item);
        const segmentLabel = segmentKeyFn(item);
        if (!entityLabel || !segmentLabel) return;
        segmentsSet.add(segmentLabel);
        if (!entities[entityLabel]) {
            entities[entityLabel] = {
                ph_gros: { val: 0, qty: 0, orders: new Set(), segments: {}, segmentsQty: {} },
                gros_super: { val: 0, qty: 0, orders: new Set(), segments: {}, segmentsQty: {} },
                total_ph_gros_val: 0
            };
        }
        const typeKey = item.order_type === 'PH_GROS' ? 'ph_gros' : 'gros_super';
        const target = entities[entityLabel][typeKey];
        target.val += item.value;
        target.qty += item.qty;
        target.orders.add(item.order_id);
        if (!target.segments[segmentLabel])    target.segments[segmentLabel]    = 0;
        if (!target.segmentsQty[segmentLabel]) target.segmentsQty[segmentLabel] = 0;
        target.segments[segmentLabel]    += item.value;
        target.segmentsQty[segmentLabel] += item.qty;
        if (typeKey === 'ph_gros') entities[entityLabel].total_ph_gros_val += item.value;
    });
    const sortedEntitiesLabels = Object.keys(entities).sort((a, b) => entities[b].total_ph_gros_val - entities[a].total_ph_gros_val);
    const segmentTotals = {};
    segmentsSet.forEach(seg => {
        segmentTotals[seg] = sortedEntitiesLabels.reduce((sum, lbl) => {
            const e = entities[lbl];
            return sum + (e.ph_gros.segments[seg] || 0) + (e.gros_super.segments[seg] || 0);
        }, 0);
    });
    const sortedSegments = Array.from(segmentsSet).sort((a, b) => segmentTotals[a] - segmentTotals[b]);
    return { labels: sortedEntitiesLabels, entities: entities, segments: sortedSegments };
}

/* ── Shared helper: draw X Bons / Y Unités / Z DA in yellow / blue / green ── */
function drawColoredLabel(ctx, x, y, prefix, bons, qty, val, prefixColor) {
    const sep = '  /  ';
    const bonsText    = `${bons} Bons`;
    const unitsText   = `${fmtUnits(qty)} Unités`;
    const daText      = fmtDA(val);

    let curX = x;

    if (prefix) {
        ctx.fillStyle = prefixColor || '#555';
        ctx.fillText(prefix + '  ', curX, y);
        curX += ctx.measureText(prefix + '  ').width;
    }

    ctx.fillStyle = '#FBC02D'; // yellow — Bons
    ctx.fillText(bonsText, curX, y);
    curX += ctx.measureText(bonsText).width;

    ctx.fillStyle = '#888';
    ctx.fillText(sep, curX, y);
    curX += ctx.measureText(sep).width;

    ctx.fillStyle = '#1976D2'; // blue — Unités
    ctx.fillText(unitsText, curX, y);
    curX += ctx.measureText(unitsText).width;

    ctx.fillStyle = '#888';
    ctx.fillText(sep, curX, y);
    curX += ctx.measureText(sep).width;

    ctx.fillStyle = '#2E7D32'; // green — DA
    ctx.fillText(daText, curX, y);
}

/* ── End-labels plugin ── */
const endLabelsPlugin = {
    id: 'endLabels',
    afterDatasetsDraw(chart, args, options) {
        const ctx = chart.ctx;
        ctx.save();
        ctx.font = 'bold 12px Arial';
        ctx.textBaseline = 'middle';
        const parsedData = options.parsedData;
        const xAxis = chart.scales.x;
        parsedData.labels.forEach((label, index) => {
            const entity = parsedData.entities[label];
            let phGrosMaxX = xAxis.getPixelForValue(0), grosSuperMaxX = xAxis.getPixelForValue(0);
            let phGrosY = null, grosSuperY = null;
            chart.data.datasets.forEach((ds, dsIndex) => {
                const meta = chart.getDatasetMeta(dsIndex);
                if (meta.hidden) return;
                const bar = meta.data[index];
                if (bar && bar.x) {
                    if (ds.stack === 'PH_GROS')         { phGrosMaxX    = Math.max(phGrosMaxX,    bar.x); phGrosY    = bar.y; }
                    else if (ds.stack === 'GROS_SUPER') { grosSuperMaxX = Math.max(grosSuperMaxX, bar.x); grosSuperY = bar.y; }
                }
            });
            if (entity.ph_gros.val > 0 && phGrosY !== null) {
                drawColoredLabel(ctx, phGrosMaxX + 10, phGrosY, '[PH_GROS]', entity.ph_gros.orders.size, entity.ph_gros.qty, entity.ph_gros.val, '#198754');
            }
            if (entity.gros_super.val > 0 && grosSuperY !== null) {
                drawColoredLabel(ctx, grosSuperMaxX + 10, grosSuperY, '[GROS_SUPER]', entity.gros_super.orders.size, entity.gros_super.qty, entity.gros_super.val, '#0d6efd');
            }
        });
        ctx.restore();
    }
};

/* ── Chart builder ── */
function drawGroupedBarChart(canvasId, parsedData, boxId, bannerId) {
    if (chartInstances[canvasId]) { chartInstances[canvasId].destroy(); delete chartInstances[canvasId]; }
    const box = document.getElementById(boxId);
    if (!parsedData || parsedData.labels.length === 0) {
        box.innerHTML = '<div style="padding:30px; text-align:center; color:#888; font-style:italic;">Aucune donnée trouvée.</div>';
        box.style.minHeight = 'auto';
        if (bannerId) document.getElementById(bannerId).style.display = 'none';
        return;
    }
    if (bannerId) document.getElementById(bannerId).style.display = 'flex';
    if (!box.querySelector('canvas')) box.innerHTML = `<canvas id="${canvasId}"></canvas>`;
    if (bannerId) {
        let phVal = 0, phQty = 0, phOrders = new Set();
        let gsVal = 0, gsQty = 0, gsOrders = new Set();
        parsedData.labels.forEach(lbl => {
            const e = parsedData.entities[lbl];
            phVal += e.ph_gros.val;    phQty += e.ph_gros.qty;
            gsVal += e.gros_super.val; gsQty += e.gros_super.qty;
            e.ph_gros.orders.forEach(id => phOrders.add(id));
            e.gros_super.orders.forEach(id => gsOrders.add(id));
        });
        const elPh = document.getElementById(bannerId + '-ph');
        const elGs = document.getElementById(bannerId + '-gs');
        if (elPh) elPh.textContent = `PH_GROS : ${phOrders.size} Bons  /  ${fmtUnits(phQty)} Unités  /  ${fmtDA(phVal)}`;
        if (elGs) elGs.textContent = `GROS_SUPER : ${gsOrders.size} Bons  /  ${fmtUnits(gsQty)} Unités  /  ${fmtDA(gsVal)}`;

}

/* ── Client data processing (single stack, sorted by total value) ── */
function processClientData(raw, filterFn, clientKeyFn, segmentKeyFn) {
    const clients = {};
    const segmentsSet = new Set();
    raw.forEach(item => {
        if (filterFn && !filterFn(item)) return;
        const clientLabel = clientKeyFn(item);
        const segmentLabel = segmentKeyFn(item);
        if (!clientLabel || !segmentLabel) return;
        segmentsSet.add(segmentLabel);
        if (!clients[clientLabel]) clients[clientLabel] = { val: 0, qty: 0, orders: new Set(), segments: {}, segmentsQty: {} };
        clients[clientLabel].val += item.value;
        clients[clientLabel].qty += item.qty;
        clients[clientLabel].orders.add(item.order_id);
        if (!clients[clientLabel].segments[segmentLabel])    clients[clientLabel].segments[segmentLabel]    = 0;
        if (!clients[clientLabel].segmentsQty[segmentLabel]) clients[clientLabel].segmentsQty[segmentLabel] = 0;
        clients[clientLabel].segments[segmentLabel]    += item.value;
        clients[clientLabel].segmentsQty[segmentLabel] += item.qty;
    });
    const labels = Object.keys(clients).sort((a, b) => clients[b].val - clients[a].val);
    const segmentTotals = {};
    segmentsSet.forEach(seg => {
        segmentTotals[seg] = labels.reduce((sum, lbl) => sum + (clients[lbl].segments[seg] || 0), 0);
    });
    const sortedSegments = Array.from(segmentsSet).sort((a, b) => segmentTotals[a] - segmentTotals[b]);
    return { labels, clients, segments: sortedSegments };
}

/* ── End-labels plugin for client charts ── */
const clientEndLabelsPlugin = {
    id: 'clientEndLabels',
    afterDatasetsDraw(chart, args, options) {
        const ctx = chart.ctx;
        ctx.save();
        ctx.font = 'bold 12px Arial';
        ctx.textBaseline = 'middle';
        const parsedData = options.parsedData;
        const xAxis = chart.scales.x;
        parsedData.labels.forEach((label, index) => {
            const client = parsedData.clients[label];
            let maxX = xAxis.getPixelForValue(0);
            let barY = null;
            chart.data.datasets.forEach((ds, dsIndex) => {
                const meta = chart.getDatasetMeta(dsIndex);
                if (meta.hidden) return;
                const bar = meta.data[index];
                if (bar && bar.x) { maxX = Math.max(maxX, bar.x); barY = bar.y; }
            });
            if (client.val > 0 && barY !== null) {
                drawColoredLabel(ctx, maxX + 10, barY, null, client.orders.size, client.qty, client.val, null);
            }
        });
        ctx.restore();
    }
};

/* ── Y-axis sub-labels plugin (wilaya + commercials below each bar name) ── */
const clientYSubLabelsPlugin = {
    id: 'clientYSubLabels',
    afterDraw(chart, args, options) {
        if (!options || !options.subLabels) return;
        const ctx = chart.ctx;
        const yScale = chart.scales.y;
        const rightEdge = chart.chartArea.left - 8;
        ctx.save();
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        
        // --- UPDATED STYLING ---
        ctx.font = 'bold 11px Arial'; // Slightly larger and bold
        ctx.fillStyle = '#1B5E20';    // Darker green to match your theme
        
        chart.data.labels.forEach((label, i) => {
            const info = options.subLabels[label];
            if (!info) return;
            const centerY = yScale.getPixelForTick(i);
            const parts = [];
            
            // Format Wilaya in uppercase for clarity
            if (info.wilaya) parts.push(info.wilaya.toUpperCase());
            if (info.commercials && info.commercials.length) parts.push(info.commercials.join(', '));
            
            if (!parts.length) return;
            // Lowered Y offset slightly to 16 for better spacing with the larger font
            ctx.fillText(parts.join('  |  '), rightEdge, centerY + 16);
        });
        ctx.restore();
    }
};

function drawClientBarChart(canvasId, parsedData, boxId, bannerId, subLabels) {
    if (chartInstances[canvasId]) { chartInstances[canvasId].destroy(); delete chartInstances[canvasId]; }
    const box = document.getElementById(boxId);
    if (!parsedData || parsedData.labels.length === 0) {
        box.innerHTML = '<div style="padding:30px; text-align:center; color:#888; font-style:italic;">Aucune donnée trouvée.</div>';
        box.style.minHeight = 'auto';
        if (bannerId) document.getElementById(bannerId).style.display = 'none';
        return;
    }
    if (bannerId) document.getElementById(bannerId).style.display = 'block';
    if (!box.querySelector('canvas')) box.innerHTML = `<canvas id="${canvasId}"></canvas>`;
    if (bannerId) {
        let globalVal = 0, globalQty = 0, globalOrders = new Set();
        parsedData.labels.forEach(lbl => {
            const c = parsedData.clients[lbl];
            globalVal += c.val; globalQty += c.qty;
            c.orders.forEach(id => globalOrders.add(id));
        });
        document.getElementById(bannerId).textContent = `Total : ${globalOrders.size} Bons  /  ${fmtUnits(globalQty)} Unités  /  ${fmtDA(globalVal)}`;
    }
    const datasets = parsedData.segments.map(seg => ({
        label: seg,
        data: parsedData.labels.map(lbl => parsedData.clients[lbl].segments[seg] || 0),
        backgroundColor: colorForLabel(seg),
        datalabels: { display: false }
    }));
    const perBarH = subLabels ? 80 : 60;
    const canvasH = Math.max(350, parsedData.labels.length * perBarH + 80);
    box.style.minHeight = canvasH + 'px';
    _pendingCharts++;
    const ctx = document.getElementById(canvasId).getContext('2d');
    chartInstances[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: { labels: parsedData.labels, datasets },
        plugins: [clientEndLabelsPlugin, clientYSubLabelsPlugin],
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { stacked: true, beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { callback: v => fmtDA(v) } },
                y: { stacked: true, grid: { display: false }, ticks: { color: '#333', font: { size: 13, weight: 'bold' } } }
            },
            plugins: {
                clientEndLabels: { parsedData },
                clientYSubLabels: { subLabels: subLabels || null },
                legend: {
                    display: true, position: 'top',
                    labels: {
                        usePointStyle: true, boxWidth: 10,
                        filter: (item, chart) => chart.datasets.findIndex(ds => ds.label === item.text) === item.datasetIndex
                    }
                },
                title: { display: false },
                tooltip: { callbacks: { label: ctx => {
                    if (ctx.raw === 0) return null;
                    const lbl = parsedData.labels[ctx.dataIndex];
                    const qty = parsedData.clients[lbl].segmentsQty[ctx.dataset.label] || 0;
                    return ` ${ctx.dataset.label} : ${fmtUnits(qty)} Unités  /  ${fmtDA(ctx.raw)}`;
                }}}
            },
            layout: { padding: { right: 380 } },
            animation: { onComplete: _onChartAnimationComplete }
        }
    });
}

function updateHeaders(params, rawData) {
    const minDate  = params.get('min_date');
    const maxDate  = params.get('max_date');
    const produitId = params.get('produit');
    const ligne    = params.get('ligne');
    const region   = params.get('region');
    const user     = params.get('user');

    const makeTag = (label, val) => `<span class="filter-tag"><strong>${label} :</strong> ${val}</span>`;
    let filtersHtml = '';
    let subtitleText = '';

    if (produitId && rawData.length > 0) {
        const prodName = rawData[0].product_name;
        document.getElementById('dynamic-page-title').innerHTML = `<i class="fas fa-box"></i> Performance du Produit : ${prodName}`;
        subtitleText = prodName;
        filtersHtml += makeTag('Produit', prodName);
    } else if (ligne) {
        document.getElementById('dynamic-page-title').innerHTML = `<i class="fas fa-layer-group"></i> Performance de la Ligne : ${ligne}`;
        subtitleText = 'Ligne : ' + ligne;
    } else {
        document.getElementById('dynamic-page-title').innerHTML = `<i class="fas fa-chart-bar"></i> Performance Globale des Produits`;
        subtitleText = 'Tous les produits';
    }

    if (minDate) filtersHtml += makeTag('Du', minDate);
    if (maxDate) filtersHtml += makeTag('Au', maxDate);
    if (ligne)   filtersHtml += makeTag('Ligne', ligne);
    if (region)  filtersHtml += makeTag('Région', region);
    if (user)    filtersHtml += makeTag('Utilisateur', user);

    document.getElementById('applied-filters-tags').innerHTML = filtersHtml || '<em style="color:#888;">Aucun filtre appliqué.</em>';

    const subtitleEl = document.getElementById('stat-subtitle');
    subtitleEl.textContent = subtitleText;

function renderZeroUsers(allLineUsers, activeLabels, containerId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    if (!allLineUsers || allLineUsers.length === 0) { el.innerHTML = ''; return; }

    const activeSet = new Set(activeLabels);
    const missing = allLineUsers.filter(u => !activeSet.has(u.user_name));

    if (missing.length === 0) { 
        el.innerHTML = ''; 
        return; 
    }

    // Grouping logic: Region -> Role -> Names
    const grouped = {};
    missing.forEach(u => {
        const reg = u.region || 'Sans Région';
        if (!grouped[reg]) grouped[reg] = { Medico_commercial: [], Commercial: [] };
        if (grouped[reg][u.role]) {
            grouped[reg][u.role].push(u.user_name);
        }
    });

    let html = `
        <div style="margin-top:16px; padding:12px; border:1px solid #ffcdd2; background:#fffbfb; border-radius:8px;">
            <div style="color:#c62828; font-weight:bold; font-size:14px; margin-bottom:8px; display:flex; align-items:center; gap:6px;">
                <i class="fas fa-exclamation-circle"></i> Utilisateurs sans commandes par région :
            </div>`;

    Object.keys(grouped).sort().forEach(region => {
        const roles = grouped[region];
        const hasMed = roles.Medico_commercial.length > 0;
        const hasCom = roles.Commercial.length > 0;

        if (hasMed || hasCom) {
            html += `
                <div style="margin-bottom:10px; padding-left:8px; border-left:3px solid #e0e0e0;">
                    <div style="font-weight:bold; color:#1B5E20; font-size:13px; text-transform:uppercase;">
                        Region: ${region}
                    </div>`;
            
            if (hasMed) {
                html += `<div style="font-size:12px; margin-top:2px;">
                            <span style="color:#757575; font-style:italic;">Medico-commerciaux :</span> 
                            <span style="color:#c62828;">${roles.Medico_commercial.join(', ')}</span>
                         </div>`;
            }
            if (hasCom) {
                html += `<div style="font-size:12px; margin-top:2px;">
                            <span style="color:#757575; font-style:italic;">Commerciaux :</span> 
                            <span style="color:#c62828;">${roles.Commercial.join(', ')}</span>
                         </div>`;
            }
            html += `</div>`;
        }
    });

    html += '</div>';
    el.innerHTML = html;
}

async function loadData() {
    const params = new URLSearchParams(window.location.search);
    
    // Initialize region filter from URL
    const filterRegionEl = document.getElementById('filter-region');
    if (params.has('region')) {
        filterRegionEl.value = params.get('region');
    }

    filterRegionEl.addEventListener('change', (e) => {
        const newRegion = e.target.value;
        if (newRegion) {
            params.set('region', newRegion);
        } else {
            params.delete('region');
        }
        window.location.search = params.toString();
    });

    try {
        const response = await fetch(`/orders/api/product-stats-data/?${params.toString()}`);
        const data = await response.json();
        const raw = data.raw_data || [];
        const allLineUsers = data.all_line_users || [];

        updateHeaders(params, raw);
        document.getElementById('global-spinner').style.display = 'none';
        document.getElementById('charts-wrapper').style.display = 'block';

        // PH_GROS orders: all users (Medico_commercial + Commercial) sorted by value
        const graph_ph_gros_users = processClientData(
            raw,
            i => i.order_type === 'PH_GROS',
            i => i.user_name   || 'N/A',
            i => i.wilaya      || 'N/A'
        );
        // GROS_SUPER orders: all users sorted by value
        const graph_gros_super_users = processClientData(
            raw,
            i => i.order_type === 'GROS_SUPER',
            i => i.user_name   || 'N/A',
            i => i.wilaya      || 'N/A'
        );

        const graph_wilayas    = processData(raw, null,                                 i => i.wilaya       || 'N/A', i => i.product_name || 'N/A');
        const graph_products   = processData(raw, null,                                 i => i.product_name || 'N/A', i => i.wilaya       || 'N/A');

        // SuperGros destockage: GROS_SUPER orders only, exclude company orders (id=149)
        const graph_supergros  = processClientData(
            raw,
            i => i.order_type === 'GROS_SUPER' && !i.from_company,
            i => i.super_gros_name || 'N/A',
            i => i.product_name    || 'N/A'
        );
        // Grossiste destockage: PH_GROS orders only (grossiste sells to pharmacy)
        const graph_gros       = processClientData(
            raw,
            i => i.order_type === 'PH_GROS',
            i => i.gros_name    || 'N/A',
            i => i.product_name || 'N/A'
        );

        // Sub-labels for chart 7: wilaya + Commercial delegates per grossiste
        const grossisteDetails = {};
        raw.filter(i => i.order_type === 'PH_GROS' && i.gros_name).forEach(i => {
            if (!grossisteDetails[i.gros_name]) grossisteDetails[i.gros_name] = { wilaya: i.gros_wilaya || '', commercials: new Set() };
            if (i.role === 'Commercial' && i.user_name) grossisteDetails[i.gros_name].commercials.add(i.user_name);
        });
        const grossisteSubLabels = {};
        Object.entries(grossisteDetails).forEach(([name, d]) => {
            grossisteSubLabels[name] = { wilaya: d.wilaya, commercials: Array.from(d.commercials) };
        });

        drawClientBarChart('chart-ph-gros-users',    graph_ph_gros_users,    'box-ph-gros-users',    'banner-ph-gros-users');
        drawClientBarChart('chart-gros-super-users', graph_gros_super_users, 'box-gros-super-users', 'banner-gros-super-users');

        // Override GROS_SUPER banner: total must include all roles (not just shown bars) to match preview
        const _gsAll = raw.filter(i => i.order_type === 'GROS_SUPER');
        const _gsOrders = new Set(_gsAll.map(i => i.order_id)).size;
        const _gsQty   = _gsAll.reduce((s, i) => s + i.qty,   0);
        const _gsVal   = _gsAll.reduce((s, i) => s + i.value, 0);
        const _gsBanner = document.getElementById('banner-gros-super-users');
        if (_gsBanner && _gsAll.length > 0) {
            _gsBanner.style.display = 'block';
            _gsBanner.textContent = `Total : ${_gsOrders} Bons  /  ${fmtUnits(_gsQty)} Unités  /  ${fmtDA(_gsVal)}`;
        }

        renderZeroUsers(allLineUsers.filter(u => u.role !== 'Superviseur_national'), graph_ph_gros_users.labels,    'zero-users-ph-gros');
        renderZeroUsers(allLineUsers.filter(u => u.role === 'Commercial'),           graph_gros_super_users.labels, 'zero-users-gros-super');
        drawGroupedBarChart('chart-wilayas',    graph_wilayas,    'box-wilayas',    'banner-wilayas');
        drawGroupedBarChart('chart-products',   graph_products,   'box-products',   'banner-products');
        drawClientBarChart('chart-supergros',   graph_supergros,  'box-supergros',  'banner-supergros');
        drawClientBarChart('chart-gros',        graph_gros,       'box-gros',       'banner-gros',       grossisteSubLabels);

        // ── NEW: Render the zero sales list ──
        const allGrossistes = data.all_grossistes || [];
        renderZeroGrossistes(allGrossistes, graph_gros.labels, 'zero-sells-gros-container', params.get('region'));

        _markDataLoaded();
    } catch (err) {
        console.error(err);
        document.getElementById('global-spinner').innerHTML = `<span style="color:red;"><i class="fas fa-exclamation-triangle"></i> Erreur de chargement des données.</span>`;
    }
}

            img.style.width = '100%';
            img.style.height = chart.canvas.style.height; 
            
            chart.canvas.parentNode.insertBefore(img, chart.canvas);
            chart.canvas.style.display = 'none'; // Hide the original canvas
        });
    }

    function afterPrint() {
        Object.entries(chartInstances).forEach(([id, chart]) => {
            // Restore padding
            if (chart.options.layout && chart.options.layout.padding && _origPaddings[id] !== undefined) {
                chart.options.layout.padding.right = _origPaddings[id];
            }
            chart._printMode = false;
            
            // Remove the temporary image
            const img = chart.canvas.parentNode.querySelector('.print-chart-img');
            if (img) img.remove();
            
            // Restore canvas
            chart.canvas.style.display = 'block';
            chart.update('none');
        });
    }

    // Attach listeners for Ctrl+P
    window.addEventListener('beforeprint', beforePrint);
    window.addEventListener('afterprint', afterPrint);

    // Backup listener for browsers that prefer matchMedia
    if (window.matchMedia) {
        const mql = window.matchMedia('print');
        mql.addEventListener('change', e => {
            if (e.matches) beforePrint();
            else           afterPrint();
        });
    }
})();
</script>
</body>
</html>
