<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Ajouter le CSS de Select2 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <!-- Ajoutez jQuery (nécessaire pour Select2) avant Select2 -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Ajouter le JS de Select2 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
    
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
    
        form {
            max-width: 500px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
    
        .form-group {
            margin-bottom: 20px;
        }
    
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
    
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
    
        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
    
        button:hover {
            background-color: #45a049;
        }
    </style>
    
</head>
<body>
    <h1>Target User</h1>
    <form action="" method="post">
        {% csrf_token %}
        
        {% if num_id == 1 %}
        {% if users %}
        <div class="form-group">
            <label for="users">Utilisateur</label>
            <select name="users" id="users" class="select2">
                <option value="00">Tous les Utilisateurs</option>
                {% for user in users %}
                    <option value="{{user.id}}">{{user.last_name}} - {{user.first_name}}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        {% endif %}

        {% if num_id == 2 %}
        {% if users %}
        <div class="form-group">
            <label for="users">Utilisateur</label>
            <select name="users" id="users">
                <option value="00">{{ name }}</option>
                {% for user in users %}
                    <option value="{{user.id}}">{{user.last_name}} - {{user.first_name}}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        {% endif %}
            
        
    
        <div class="form-group">
            <label for="months">Mois</label>
            <select name="months" id="months" multiple>
                <option value="01">Janvier</option>
                <option value="02">Février</option>
                <option value="03">Mars</option>
                <option value="04">Avril</option>
                <option value="05">Mai</option>
                <option value="06">Juin</option>
                <option value="07">Juillet</option>
                <option value="08">Août</option>
                <option value="09">Septembre</option>
                <option value="10">Octobre</option>
                <option value="11">Novembre</option>
                <option value="12">Décembre</option>
                <option value="0">Tous les Mois</option>
            </select>
        </div>
    
        <div class="form-group">
            <label for="years">Année</label>
            <select name="years" id="years">
                
                <option value="2025">2025</option>
            </select>
        </div>
    
        <button type="submit">Afficher</button>
    </form>
    <!--<a href="{% url 'addorder'%}">LINK</a>-->
    <script>
        $(document).ready(function() {
            // Appliquer Select2 sur le select avec l'id #users
            $('#users').select2();
        });
    </script>
</body>
</html>
