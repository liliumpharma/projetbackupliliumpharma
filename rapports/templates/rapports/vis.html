<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css?family=Montserrat&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css'%}">
    <link rel="stylesheet" href="{% static 'css/toast/vanilla-toast.css'%}">
    {%block styles%}
    {%endblock styles%}
    <title>{% block title %}{%endblock title%}</title>
  </head>
  <style>
    header {
        background-color: #e0f0e9;
        padding: 10px 20px;
        display: flex;
        align-items: center;
    }
    
    .back-arrow a {
        color: #333;
        text-decoration: none;
        font-weight: bold;
        font-size: 16px;
    }
    
    .back-arrow a:hover {
        text-decoration: underline;
    }
    
    h1 {
        margin: 0;
        padding-left: 20px;
    }
    
    .content {
        padding: 20px;
    }
    
    .fa-arrow-left {
        margin-right: 5px;
        color: #fff;
        background-color: #4CAF50;
        border-radius: 50%;
        padding: 8px;
    }
    
    
    </style>
    
<header>
    <div class="back-arrow">
        <a onclick="goBack()"><i class="fas fa-arrow-left"></i></a>
    </div>
    <h1>Ajouter Un Rapport</h1>
</header>

<form method="post" enctype="multipart/form-data" class="mt-3">
    {% csrf_token %}
    
    {% if m %}
        <p>{{m}}</p>            
    {% endif %}
        
    <div class="mb-3">
        <label class="form-label" for="id_image">Image principale</label>
        <input type="file" name="image" id="id_image" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label" for="id_image2">Image secondaire</label>
        <input type="file" name="image2" id="id_image2" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">Envoyer</button>
</form>

<script>
function goBack() {
    window.history.back();
}
</script>


</div>

</div>

{% block scripts%}
<script>
  $(document).ready(function(){
    $('.del').click(function(e){
      e.preventDefault();
      if (confirm("etes vous sur de bien vouloir suprimmer"))
         window.location.assign($(this).attr('href'))
    })
  })
</script>
{%endblock scripts%}
