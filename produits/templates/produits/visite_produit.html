    const monthSelect = document.getElementById('monthSelect');
    const currentDate = new Date();
    const currentYear = currentDate.getFullYear();
    const currentMonth = currentDate.getMonth() + 1; // Les mois commencent à partir de zéro (janvier = 0)

    // Ajouter les options pour les mois jusqu'au mois courant de l'année
    for (let month = 1; month <= currentMonth; month++) {
        const option = document.createElement('option');
        option.value = `${currentYear}-${String(month).padStart(2, '0')}`;
        option.textContent = `${getMonthName(month)} ${currentYear}`;
        monthSelect.appendChild(option);
    }
});

// Fonction pour obtenir le nom du mois à partir de son numéro
function getMonthName(monthNumber) {
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    return months[monthNumber - 1];
}

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Récupérer les produits disponibles depuis le serveur
      fetch('https://app.liliumpharma.com/produits/api/visites-produit/').then(response => response.json()).then(data => {
        // Créer un ensemble (Set) pour stocker les noms de produits uniques
        const uniqueProducts = new Set();
        // Parcourir la liste d'objets et ajouter les noms de produits à l'ensemble
        data.forEach(item => {
          uniqueProducts.add(item.product);
        });
        // Convertir l'ensemble en un tableau pour pouvoir itérer dessus
        const productsArray = Array.from(uniqueProducts);
        // Sélectionner le select et ajouter les options pour chaque produit
        const productSelect = document.getElementById('productSelect');
        productsArray.forEach(product => {
          const option = document.createElement('option');
          option.value = product;
          option.textContent = product;
          productSelect.appendChild(option);
        });
        // Mettre à jour le graphique avec les données du premier produit lors du chargement initial
        updateChart();
      }).catch(error => {
        console.error('Error fetching data:', error);
      });
    });

    function calculateTotalCountByYear(data) {
      let totalCountByYear = {
        2023: 0,
        2024: 0
      };
      data.forEach(item => {
        totalCountByYear[item.year] += item.count;
      });
      return totalCountByYear;
    }
    // Mettre à jour le contenu de la balise 

    function updateTotalCount(totalCountByYear) {
      const totalSpan = document.getElementById('total');
      totalSpan.textContent = `Number of Calls in 2024: ${totalCountByYear['2024']}`;
    }
    // Calculer la somme des counts par année
    const totalCountByYear = calculateTotalCountByYear(data);
    updateTotalCount(totalCountByYear);

    function updateChart() {
      const selectedProduct = document.getElementById('productSelect').value;
      const selectedMonth = document.getElementById('monthSelect').value;

      fetch(`https://app.liliumpharma.com/produits/api/visites-produit/?user=7&product=${selectedProduct}&month=${selectedMonth}`).then(response => response.json()).then(data => {
        const labels = data.map(item => `${item.year}-${item.month}-${item.day}`);
        const counts = data.map(item => item.count);
        // Calculer la somme des counts par année
        const totalCountByYear = calculateTotalCountByYear(data);
        // Mettre à jour le contenu de la balise 
        updateTotalCount(totalCountByYear);
        const ctx = document.getElementById('myChart').getContext('2d');
        // Vérifiez si window.myChart est défini et s'il contient une instance de Chart.js
        if (window.myChart) {
          // Si oui, détruisez le graphique existant avant d'en créer un nouveau
          if (typeof window.myChart.destroy === 'function') {
            window.myChart.destroy();
          }
        }
        window.myChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: `Number of Visits for ${selectedProduct}`,
              data: counts,
              backgroundColor: 'rgba(75, 192, 192, 0.2)',
              borderColor: 'rgba(75, 192, 192, 1)',
              borderWidth: 1
            }]
          },
          options: {
            scales: {
              yAxes: [{
                ticks: {
                  beginAtZero: true
                }
              }]
            }
          }
        });
      }).catch(error => {
        console.error('Error fetching data:', error);
      });
    }
  </script>
