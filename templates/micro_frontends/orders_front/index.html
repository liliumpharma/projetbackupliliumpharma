@media (max-width: 768px) {
  /* Target the parent container seen in your second screenshot */
  div.flex.items-center.gap-1.py-1 {
    flex-wrap: wrap !important;
    justify-content: flex-start; /* Keeps items aligned to the left */
  }

  /* Target the specific wrapper with the 3 checkboxes */
  #custom-filter-wrapper {
    margin-left: 0 !important; /* Remove the left margin so it doesn't push off-screen */

    width: 100%; /* Forces it to take its own line */
    display: flex !important;
    justify-content: flex-start;
  }
}
</style>
